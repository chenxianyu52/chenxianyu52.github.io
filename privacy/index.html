<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Privacy Policy Archive</title>
  <meta name="description" content="Privacy policy URL archive for apps published by chenxianyu52.">
  <style>
    :root { color-scheme: light dark; --bg: #f8fafc; --card: #fff; --text: #172033; --muted: #64748b; --border: #e2e8f0; --accent: #2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg: #0b1020; --card: #121a2b; --text: #edf2ff; --muted: #aab5c5; --border: #243047; --accent: #7aa2ff; } }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
    main { max-width: 920px; margin: 0 auto; padding: 48px 20px; }
    h1 { font-size: clamp(2rem, 4vw, 3rem); margin: 0 0 8px; }
    p { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; margin-top: 28px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    th, td { padding: 14px 16px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    a { color: var(--accent); }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.92em; }
  </style>
</head>
<body>
  <main>
    <h1>App Privacy Policy Archive</h1>
    <p>Canonical privacy policy URL mapping for apps published by chenxianyu52.</p>
    <table>
      <thead>
        <tr>
          <th>App</th>
          <th>Package</th>
          <th>Privacy Policy URL</th>
          <th>Last Updated</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>MetaStrip</td>
          <td><code>com.xianyu.metastrip</code></td>
          <td><a href="metastrip/">https://chenxianyu52.github.io/privacy/metastrip/</a></td>
          <td>2026-04-30</td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
